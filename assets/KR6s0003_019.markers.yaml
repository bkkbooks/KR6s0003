  - {type: variant, offset: 3107, length: 208, content: 述曰：如前教已復將經像至病人所，題其經名、像名，告語示之，使開目睹見，令其惺悟，兼請有德智人讀誦大乘，助揚讚唄，幡花亂墜，宛轉目前，香氣氛氳，常注鼻根，恒與善語，勿傳惡言。以臨終時多有惡業相現，不能立志，排除是故，瞻病之人特須方便善巧誘訹，使心心相續，剎那不駐，乘此福力作往生淨土之意。故《智度論》云：「從生作善，臨終惡念便生惡道；從生作惡，臨終善念而生天上。」又《維摩經》云：「憶所修福，念於淨命。」又《正法念經》云：「若有眾生持戒之人於破戒病人不求恩慧心，不疲厭供養病人，命終生普觀天，五欲縱逸不知厭足。」K31n1052_p0258c19-p0259a11, 大: ''}
