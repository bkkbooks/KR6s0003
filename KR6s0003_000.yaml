front:
  text: 諸經要集序西明寺沙門釋道世集原夫法身一相瞻仰異容正教無偏說聽殊旨故師有等雨之況弟子有異聞之說良以隨機授與逐器淺深至如十二分教之大綱八萬法門之廣派龍宮西蓄未盡懋林之知象駕東馳豈窮手葉之誨是以不遊大海未覩沃日之奇不仰太山靡覿干霄之狀得驪龍之珍乃驗魚目之非寶聽黃鍾之節方知擊缶之為細故知釋典幽宗聖凡所尚實人天之祕寶越儒墨之希聲威振大千光超巨億益覃沙界功逾塵劫弘濟之術其大矣哉但時緣未會感通有殊暨晨林變釆霄夢啓徵創開白馬之基漸被赤烏之歲聖迹遐感年逾六百道俗蒙益等同一子慨正像䆮移沿流末代凡情暗短器識昏迷日有澆醨教沈道喪所以彝章訛替教迹淪湑文句浩汗卒難尋覽故於顯慶年中讀一切經隨情逐要人堪行者善惡業報録出一千述篇三十勒成兩帙冀道俗依行傳燈有據敬尋釋典深奧非淺識之所知出俗幽微豈滯惑而能辨良由海大舟輕山高塵眇操刀易割製錦難成不揆庸識妄談祕典輒樹題目更增愧恧矣三寶部敬塔部攝念部入道部唄讚部香燈部受請部受齊部破齊部富貴部貧賤部獎導部報恩部放生部興福部擇交部思慎部六度部業因部欲蓋部四生部受報部十惡部詐僞部惰慢部酒宍部占相部地獄部送終部雜要部
