body:
  text: 西明寺沙門釋道世集敬法篇第二此有八緣敬僧篇第三此有三緣述意緣説法緣聽法緣漸頓緣求法緣感福緣報恩緣謗法緣述意緣第一蓋聞寂滅不動是則無象無言感而遂通所以有名有教是以一四之句難聞三千之火易入庶使凝寒靜夜朗月長宵獨處空間吟誦經典吐納宮商文字分明言味流美詞韻相屬適衆人心利生物善足使幽靈欣躍精神悅豫久習純熟文義洞曉敬心殷誦至誠冥感信知受持一偈福利弘深書寫一言功超纍劫是以迦葉頂受靡吝剝皮薩陀心樂無辭灑血此是甘露之初門入道之終德也説法緣第二夫法師升座先須禮敬三寶自淨其心觀時擇人具慈悲意救生利物然後為説故報恩經云聽者坐説者立不應為説若聽者求説者過不應為説若聽者依人不依法依字不依義依不了義經不依了義經依識不依智並不應為説何以故是人不能恭敬諸佛菩薩清淨法故若説尊重於法聽法之人亦生宗敬至心聽受不生輕慢是名清淨説又五分律云除其貪心不自輕心不輕大衆心慈心喜心利益心不動心立此等心乃至宣説一四句偈令前人如實解者長夜安樂利益無量又涅槃經云若有受持讀誦書寫宣説非時非國不請而説輕心輕他自歎隨處而説反滅佛法乃至令無量人死墮地獄則是衆生惡知識也又十誦律云有五種人問法皆不應為説一試問二無疑問三不為悔所犯故問四不受語故問五詰難故問並不得答若前人實有好心不具前意為欲生善滅惡者法師隨機方便好心為説若自解未明或於法有疑者則不得為説恐令前人有錯傳之失彼此得罪又優婆塞戒經云佛言如法住者能自他利不如法住者則不得名自利利他如法住者有八智何等為八一法智二義智三時智四知足智五自他智六衆智七根智八上下智是人具足如是八智凡有所説具十六事一時説二至心説三次第説四和合説五隨義説六喜樂説七隨意説八不輕衆説九不訶衆説十如法説十一自他利説十二不散亂説十三合義説十四真正説十五説已不生憍慢十六説已不求來世報如是之人能從他聽又正法念經云若有衆生正行善業為邪見人説一偈法令淨信佛命終生應聲天受種種樂從天還退隨業流轉若為財物故與人説法不以悲心利益衆生而取財物或用飲酒或與女人共飲共食如伎兒法自賣求財如是法施其果甚少生於天上作智慧鳥能説偈頌是則名曰下品法施也云何名為中品法施耶為名聞故為勝他故為勝餘大法師故為人説法或以姤心為人説法如是法施得報亦少生於天中受中異報或生人中是則名曰中品法施也云何名為上品法施耶以清淨心為欲增長衆生智慧而為説法不為財利為令邪見衆生等住於正法如是法施自利利人無上最勝乃至涅槃其福不盡是則名曰上品法施也又迦葉經爾時世尊而説偈曰三千大千界珍寶滿其中以此用布施所得功德少若説一偈法功德為甚多三界諸樂具盡持施一人不如一偈施功德為最勝此功德勝彼能離諸苦惱若恆沙世界珍寶滿其中以施諸如來不如一法施施寶福雖多不及一法施一偈福尚勝況多難思議又十住毗婆沙論云在家之人當行財施出家之人當行法施何以故在家法施不及出家人以聽受法者於在家人信心淺薄故又在家之人多有財物出家之人於諸經法讀誦通達為人解説在衆無畏非在家者之所能及又使聽者起恭敬心不及出家又欲説法降伏人心不及出家如偈説曰先自修行法然後教餘人乃可作是言汝隨我所行身自行不善安能令彼善自不得寂滅何能令人寂又出家之人若行財施則妨餘善遠離阿練若處必至聚落與白衣從事多有言説發起三毒於六度等心薄乃至貪著五欲捨戒還俗故名為死或能反戒易起重罪是名死等諸煩惱苦患以是因緣故於出家者稱歎法施於在家者稱歎財施又金光明經云説法者有五種事一者法施彼我兼利財施不爾二者法施能令衆生出於三界財施者不出欲界三者法施利益法身財施之者長養色身四者法施增長無窮財施必有竭盡五者法施能斷無明財施唯伏貪心故知財施不及法也就法施中自有階漸若有所解不用他知恐他勝己祕而不説則自未來常不聞法又智度論云若吝惜法則常生邊地無佛法處由吝法故障他慧明此則不如賣法他人反勝過此又諸法勇王經云閻浮提中所有水陸空行衆生盡得人身若有一人教是諸人令其安住五戒十善所得功德不如有人教誨一人令得信行又十住毗婆沙論云有四法能退失智慧菩薩所應遠離何等為四一不敬法及説法者二於要法祕匿吝惜三樂法者為作障礙壞其聽心四懷憍慢自高卑人復有四法得其智慧應常修習何等為四一恭敬法及説法者二如所聞法及所讀誦為他人説其心清淨不求利養三知從多聞得智慧故勤求不息如救頭然四如所聞法受持不忘貴如説行不貴言説聽法緣第三夫欲聽法要須真心敬法重人至誠出離不希人天有為之法故阿含經佛説偈云聽者端心如渴飲一心入於語義中聞法踊躍心悲喜如是之人可為説又優婆塞戒經云從他聽時具十六事一時聽二樂聽三至心聽四恭敬聽五不求過聽六不為論議聽七不為勝聽八聽時不輕説者九聽時不輕於法十聽時終不自輕十一聽時遠離五蓋十二聽時為受持讀誦十三聽時為除五欲十四聽時為具信心十五聽時為諸衆生十六聽時為斷暗根善男子具八智者能説能聽如是之人能自他利不具足者則不得名自利利他又阿育王經云昔阿恕伽王使道人説法時以步障遮諸婦女使其聽法爾時法師為諸婦女説法恆説施論戒論生天之論有一婦女分犯王法發幕向法師前問法師言如來大覺於菩提樹下覺諸法時覺悟施戒耶更悟餘法耶法師答言佛覺一切有漏法皆苦猶若融鐵此苦因從習而生猶如毒樹修八正道以滅苦習是女人得聞此語獲得須陀洹道以刀繫頸往到王所而白王言我今日犯王重法願王以法治我王問言汝犯何事答言我破王禁制至道人所譬如渴牛不避於死我實渴於佛法是以默突聽法王問言聽法時頗有所得不答言得見四真諦解陰入界及以諸大皆知無我遂得法眼王聞是語踊躍歡喜即為作禮即唱令言自今已後不聽作障隔樂聽法者聽直至法師所對面聽法歎言奇哉我宮內乃出人寶以是因緣當知聽法有大利益又雜寶藏經云爾時般遮羅國以五百白雁獻波斯匿王王命送著祇桓精舍衆僧食時人以食乞雁見僧聚來在前立佛以一音説法衆生各得類解當時群雁亦解佛語聞法歡喜鳴聲相和還於池水後毛羽轉長飛至餘處獵師以網都覆殺之一雁作聲諸雁皆和謂聽法時聲乘是善心生忉利天生天之法法有三念一念本所從來二念定生何處三念先作何業得來生天便自思惟自見宿日更無餘善唯佛僧邊聽法作是念已五百天子即時來下在如來邊佛為説法悉得須陀洹波斯匿王遇到佛所常見五百雁羅列佛前是日不見便問佛言此中諸雁向何處去佛言欲見諸雁者先雁飛去他處為獵所殺命終生天今此五百諸天子等著好天冠端正殊特者是今日聽法皆得須陀洹王問佛言此諸群雁以何業緣墮於畜生命終生天今日得道佛言昔迦葉佛時五百女人盡共受戒用心不堅毀所受戒犯戒因緣墮畜生中作此雁身以受戒故得值如來聞法獲道以雁身中聽法因緣生於天上又舊雜譬喻經云昔有沙門晝夜誦經有狗伏床下一心聽經不復念食如是積年命盡得人形生舍衛國中作女人長大見沙門分衛便走自持飯與沙門歡喜後作比丘尼得應道果又付法藏經云佛言一切衆生欲出三界生死大海必假法船方得度脫法為清涼除煩惱熱法是妙藥能愈結病法是衆生真善知識作大利益濟諸苦惱所以然者一切衆生志性無定隨所染習近善則善近惡則惡若近惡友便造惡業流轉生死無有邊際若近善友起信敬心聽受妙法必能令離三塗苦惱由此功德受最勝樂華氏國王有一白象能滅怨敵若人犯罪令象踏殺後時象廄為火所燒移象近寺象聞比丘誦法句經偈云為善生天為惡入淵象聞法已心便柔和起慈悲心後付罪人但以鼻嗅舌舐而去都不肯殺王見斯已心大惶怖即召諸臣共謀此事智臣白王此象近寺必聞妙法是故爾耳今可移近屠肆處繫王用其言象見屠殺惡心猛熾殘害更增是以當知一切衆生志性無定畜生尚爾聞法生慈見殺增害豈況於人而不染習是故智者宜應覺知見惡須棄覩善宜近勤聽經法又於往昔有婆羅門持人髑髏其數甚多詣華氏城中遍行衒賣經歷多時都無買者時婆羅門極大瞋恚高聲罵言此城中人愚癡暗鈍若不就我買髑髏者我當與作惡名聞也爾時城中諸優婆塞聞畏毀謗便將錢買即以銅箸貫穿其耳若徹過者便與多價其半徹者與價漸少都不通者全不與直婆羅門言我此髑髏皆悉無異何故與價差別不等優婆塞言前徹過者此人生時聽受妙法智慧高勝貴其如此相與多價其半徹者雖聽經法未善分別故與少直全不通者此人往昔都不聽法故不與價時優婆塞持此髑髏往至城外起塔供養命終之後悉得生天以是因緣當知妙法有大功德此優婆塞以聽法人髑髏起塔而供養之尚得生天況能至心聽受經法供養恭敬持經人者此之福報實難窮盡未來必當成無上道是故智者欲得無上安隱快樂應當至心勤聽經法又賢愚經云昔佛在世時舍衛國中須達長者信敬佛法為僧檀越衆僧所須一切供給須達家內有二鸚鵡一名律提二名賒律提稟性黠慧解人言語見比丘來先告家內令出迎逆阿難後時到長者家見鳥聰黠為説四諦苦集滅道門前有樹二鳥聞法飛向樹上歡喜誦持夜在樹宿野狸所食緣此善根生四天王天盡彼天壽生忉利天忉利天壽盡生夜摩天夜摩壽盡生兜率天兜率壽盡生化樂天化樂壽盡生於第六他化自在天他化壽盡還生化樂天如是次第還復下至四天王天四天壽盡還復上至他化自在天如是上下經於七返生六欲天自恣受樂六天之壽而無中夭後時命終來生人中出家修道得辟支佛一名曇摩二名修曇摩又賢愚經云昔佛在世時有一比丘林中誦經音聲雅好時有一鳥聞法敬愛在樹而聽時為獵師所射命終緣此善根生忉利天面貌端正光明昞然無有倫匹自識宿命知因比丘誦經聽法得生此中即持天華到比丘所禮敬問訊以天香華供養比丘比丘具問知其委曲即命令坐為其説法得須陀洹既得果已還歸天上禽鳥聽法尚獲福報無邊豈況於人信心聽法寧無善報又善見律論云昔佛在世時到瞻婆羅國迦羅池邊為衆説法時彼池中有其一蛤聞佛池邊説法之聲即從池出入草根下聽佛説法時有一人持杖放牛見佛在坐為衆説法即往佛所欲聞法故以杖刺地誤著蛤頭即便命終生忉利天以福報故宮殿縱廣十二由旬與諸天女娛樂受樂即乘宮殿往至佛所頭頂禮足佛知故問汝是何人忽禮我足神通光明相好無比照徹此間蛤天即以偈而答曰往昔為蛤身於水中覓食聞佛説法聲出至草根下有一牧牛人持杖來聽法杖劖刺我頭命終生天上佛以蛤天人所説偈為四衆説法是時衆中八萬四千人皆得道迹蛤天得須陀洹果含笑而去漸頓緣第四如百喻經云昔有一聚落去王城五由旬村中有好美水王敕村人常使日日送其美水村人疲苦悉欲避遠此村去時彼村主語諸人言汝等莫去我當為汝白王改五由旬作三由旬使汝得近往來不疲即往白王王為改之作三由旬衆人聞已便大歡喜有人語言此故是本五由旬更無有異雖聞此言信王語故終不肯捨世間之人亦復如是修行正法度於五道向涅槃城心生疲倦便欲捨離頓駕生死不能復進如來法王有大方便於一乘法分別説三小乘之人聞之歡喜以為易行修善進德求度生死後聞人説無有三乘故是一乘以信佛語終不肯捨如彼村人亦復如是又華嚴經云佛子譬如日出先照一切大山王次照一切大山照金剛寶山然後普照一切大地日光不作是念我應先照諸大山王次第乃至普照大地但彼山地有高下故照有先後如來應供等正覺亦復如是成就無量無邊法界智慧日輪常放無量無礙智慧光明先照菩薩等諸大山王次照緣覺次照聲聞次照決定善根衆生隨應受化然後悉照一切衆生乃至邪定為作未來饒益因緣如來智慧日光不作是念我當先照菩薩乃至邪定但放大智日光普照一切佛子譬如日月出現世間乃至深山幽谷無不普照如來智慧日月亦復如是普照一切無不明了但衆生希望善根不同故如來智光種種差別又涅槃經云若離四法得涅槃者無有是處何等為四一親近善友二專心聽法三繫念思惟四如法修行以是義故聽法因緣則得近於大般涅槃何以故開法眼故世有三人一者無目譬凡夫人二者一目譬聲聞人三者二目譬諸菩薩言無目者常不聞法一目之人雖暫聞法其心不住二目之人專心聽受如聞而行以聽法故得知世間如是三人求法緣第五如雜寶藏經云佛法寬廣濟度無崖至心求道無不獲果乃至戲笑福不唐捐如往昔時有老比丘年已朽邁神情昏塞見諸年少比丘種種説法聞説四果心生羡尚語少比丘言汝等聰慧願以四果以用與我諸少比丘而語言我有四果須得好食然後相與時老比丘聞其此語歡喜即設種種肴膳請少比丘求乞四果諸少比丘食其食已更相麾弄老比丘語言大德汝在此舍一角頭坐當與爾果時老比丘聞已歡喜如語而坐諸少比丘即以皮毱打其頭上而語之言此是須陀洹果老比丘聞已繫念不散即獲初果諸少比丘復弄之言雖與爾須陀洹果然其故有七生七死更移一角次當與爾斯陀含果時老比丘獲初果故心轉增進即復移坐諸少比丘復以毱打頭而語之言與爾二果時老比丘益加專念即證二果諸少比丘復弄之言汝今已得斯陀含果猶有往來生死之難汝更移坐我當與爾阿那含果時老比丘如言移坐諸少比丘復以毱打而語之言我今與爾第三之果時老比丘聞已歡喜倍加至心即時復證阿那含果諸少比丘復弄之言汝今已得不還之果然故於色無色界受有漏身無常遷壞念念是苦汝更移坐次當與爾阿羅漢果時老比丘如語移坐諸少比丘復以皮毱撩打其頭而語之言我今與爾彼第四果時老比丘一心思惟即證阿羅漢果得四果已甚大歡喜設諸肴膳種種香華請少比丘報其恩德與少比丘共論道品無漏功德諸少比丘發言滯塞時老比丘方語之言我已證得阿羅漢果已諸少比丘聞其此音咸皆謝悔先戲弄罪是故行人宜應念善乃至戲弄猶獲實報況至心也又雜寶藏經云昔有一女人聰明智慧深信三寶常於僧次請一比丘就舍供養後時便有一老比丘次到其舍年老根鈍素無知曉齋食訖已女人至心求請説法敷坐頭前閉目靜坐比丘自知不解説法趣其睡眼棄走還寺然此女人至心思惟有為之法無常苦空不得自在深心觀察即時獲得須陀洹果既得果已向寺求覓欲報其恩然此比丘自審無知棄他逃走倍生慚恥轉復藏避而此女人苦求不已方自出現女人見已具説蒙得道果因緣齎供報恩老比丘聞甚大慚愧深自剋責亦復獲得須陀洹果是故行者應當至心精誠求法若至心者所求必獲又集一切福德三昧經云昔過去久遠阿僧祇劫有一仙人名曰最勝住山林中具五神通常行慈心後作是念非但慈心能濟衆生唯集多聞能滅衆生煩惱邪見能生正見念已便詣城邑聚落處處推求説法之師時有天魔來語仙言我今有佛所説一偈汝今若能剝皮為紙刺血為墨折骨為筆書寫此偈當為汝説最勝仙人聞已念言我於無量百千劫中常以無事為他割截受苦無量都無利益我今當捨不堅之身易得妙法歡喜踊躍即以利刀剝皮為紙刺血為墨折骨為筆合掌向天請説佛偈時魔見已愁憂燋悴即便隱去仙人見已作如是言我今為法不惜身命剝皮為紙刺血為墨折骨為筆為衆生故至誠不虛餘方世界有大慈悲能説法者當現我前作是語時東方去此三十二剎有佛國土名普無垢其國有佛號淨名王忽住其前放大光明照最勝身苦痛即除平復如故佛即廣為説集一切福德三昧最勝聞法得無礙辨佛説法已還復不現最勝仙人得辨才已為諸衆生廣説妙法令無量衆生住三乘道經千歲後爾乃命終生淨名王普無垢國由敬法故今得成佛佛告淨威昔最勝者今我身是是以當知若有人能恭敬求法佛於其人不入涅槃法亦不滅雖在異土常面覩佛得聞正法如涅槃經雪山童子為半偈捨身大品經薩陀菩薩為求法故打骨出髓等如是因緣無量不可具説述曰時有道俗薄學淺識謂智過人設欲修學不專內典唯慕俗書外道典籍故涅槃經佛言我滅度後有聲聞弟子愚癡破戒喜生鬪爭捨十二部經讀誦種種外道典籍文頌手筆受畜一切不淨之物言是佛聽如是之人以好栴檀貿易凡木以金易鍮石以銀易白鑞以絹易氀褐以甘露易於惡毒汁又婆沙論云如人觀日眼不明淨外道書論思求之時使慧眼不淨如人觀月眼則明淨佛法經論思求之時令慧眼明淨若思求外俗如打獼猴唯出不淨若思求佛法如練真金多練多淨又菩薩善戒經云菩薩不讀不誦如來正經讀誦世典文頌書疏者得罪不犯者若為論義破於邪見若二分佛經一分外書何以故為知外典是虛妄法佛法真實故為知世事故不為世人所輕慢故以此文證佛法學人若一向廢內尋外則便得罪縱解理行唯可暫習為伏外道還須厭離進修內業務令增勝若偏耽著則壞正法故地持論云若菩薩於佛所説棄捨不學反習外道邪論世俗經典是名為犯衆多犯是犯染污起若上聰明人能速受學得不動智於日日中常以二分受學佛法一分外典是名不犯若於世典外道邪教愛樂不捨不作棄想是名為犯衆多犯是犯染污起感福緣第六如普曜經云若有賢人聞是經典叉手自歸即捨八事懈怠之本成八功勳何謂為八一得端正好色二得力勢強盛三得眷屬滋茂四逮得辨才無量五學疾得出家六所行清淨七得三昧定八得智慧明無所不照若有法師布坐諷誦是經得八座福何謂為八一得長者座二得轉輪王座三得天帝座四得自在天座五得羅漢座六得菩薩座七得如來座八得轉法輪度脫一切衆生座若有法師斑宣是法有讚歎善哉者當得八清淨行何謂為八一言行相應無所違失二口言至誠而無虛妄三在於衆會真諦無欺四所言人信不捨遠之五所言柔軟初無麁獷六其聲悲和猶如哀鸞七身心隨時音聲如梵會中人聞莫不咨受八音響如佛可衆生心若有書是經典得八大藏何謂為八一得意藏未曾忘捨二得心藏無所不解分別經法三得往來藏普解一切諸佛經法四得總持藏一切所聞皆能識念五得辨才藏為諸衆生斑宣經典皆歡喜受六甚深法藏將護正法七道意法藏未曾斷絶三寶法教八奉行法藏則輒逮得無所從生忍又度無極集經云昔有比丘精進守法所可諷誦是般若波羅蜜其有聞者莫不歡喜有一小兒厥年七歲城外牧羊遙聞比丘誦經聲即詣精舍禮拜聽其經言時説色空聞即悟解便問比丘應答不可小兒反為比丘解説其義昔所希聞怪此小兒智慧非凡時小兒即去逐牛至山值一虎害此小兒命終生長者家夫人懷妊口便能説般若波羅蜜從朝至夜初不懈息其長者家怪此夫人謂呼鬼病有比丘至舍聞聲甚喜比丘報言此非鬼病但説尊經夫人出禮比丘復為説法諸有疑難不能及者盡為解説衆僧歡喜日月滿足産得男兒適生叉手長跪説波羅蜜夫人産已還復如本比丘言真佛弟子好養護之此兒後大當為一切衆人作師吾等悉當從其啓受時兒七歲道法悉備舉衆超絶智度無極經中誤脫皆為刪定兒每所至輒開化人長者室家大小五百人衆皆從兒學八萬四千人皆發無上正真道意五百比丘聞兒所説盡漏意解志求大乘得法眼淨是時兒者則吾身是比丘者迦葉佛是又舍利弗處胎經云母懷舍利弗母亦聰明高僧傳云母懷羅什令母聰明舊日誦千偈懷胎之時日得二千偈初成須陀洹果後得斯陀含果如勝天王經云若有法師流通此經處此地即是如來所行於彼法師當生善知識心尊重之心猶如佛心見是法師恭敬歡喜尊重讚歎又云我若住世一劫若減一劫説是流通此經法師功德不能究盡若此法師所行之處善男子善女人宜應刺血灑地令塵不起如是供養未足為多也如來法難受持故又涅槃經云若有善男子善女人聞是經名生四惡趣者無有是處若有衆生一經耳者悉能滅除一切諸惡無間罪業又云若有衆生一經耳者却後七劫不墮惡趣又云若有能知如來常住無有變異或聞常住二字音聲若一經耳即生天上後解脫時乃能證知如來常住無有變易又華嚴經云若聞一句未曾聞法勝得三千大千世界珍寶是菩薩得聞一偈正法生無上財想勝得轉輪聖王位又法華經云若善男子善女人受持是法華經若讀若誦若解説若書寫是人當得八百眼功德千二百耳功德八百鼻功德千二百舌功德八百身功德千二百意功德又涅槃經云我涅槃後若有得聞如是大乘微妙經典生信敬心當知是等於未來世百千億劫不墮惡道又云若有於一恆佛所發心然後乃能於惡世中不謗是法愛樂是典不能為人分別廣説若有於二恆佛所發心然後乃能於惡世中不謗是法正解信樂受持讀誦亦不能為他人廣説若有於三恆佛所發心然後乃能於惡世中不謗是法乃至書寫經卷雖為他説未解深義若有於四恆佛所發心然後乃能於惡世中不謗是典乃至書寫經卷為他廣説十六分中一分之義若有於五恆佛所發心乃至於惡世中為人廣説十六分中八分之義若有於六恆佛所發心乃至於惡世中為他廣説十六分中十二分義若有於七恆佛所發心乃至於惡世中為他廣説十六分中十四分義若有於八恆佛所發心乃至於惡世中書寫經卷亦勸他人令得書寫自能聽受亦勸他人令解聽受如説修行具足能解盡其義味報恩緣第七如善恭敬經云佛告阿難若有從他聞一四句偈或抄或寫書之竹帛所有名字於若干劫取彼和上阿闍梨等荷擔肩上或時背負或以頂戴常負行者復將一切音樂之具供養是師作如是事尚自不能具報師恩若當來世於師和上所起不敬心恆説於過我説愚癡極受多苦於當來世必墮惡道是故阿難我教汝等常行恭敬尊重之心當得如是勝上之法所謂愛重三寶甚深之法又梵網經云若佛子見大乘法師同見同行來入僧坊舍宅城邑若百里千里來者即迎來送去禮拜供養日日三時供養日食三兩金百味飲食床座供養法師一切所須盡給與之常請法師三時説法日日三時禮拜不生瞋心患惱之心為法滅身請法若不爾者犯輕垢罪又優婆塞戒經云若優婆塞受持六重戒已四十里中有講法處不能往聽得失意罪又大方等陀羅尼經云佛告阿難若有父母妻子不放此人至於道場者此人應向父母等前燒種種香長跪合掌應作是言我今欲至道場哀愍聽許亦應種種諫曉隨宜説法亦應三請若不聽者此人應於舍宅默自思惟誦持經典又正法念經云若人供養説法法師當知是人即為供養現在世尊其人如是隨所供養所願成就乃至得阿耨菩提以能供養説法法師故何以故以聞法故心得調伏以調伏故能斷無知流轉之暗若離聞法無有一法能調伏心又勝思惟經云不起罪業不起福業不起無動業者是名供養佛又華手經云若以華香衣食湯藥等供養諸佛不名為真供養如來坐道場所得微妙之法隨能修學者是名真供養故説偈云若以華塗香衣食及湯藥以此供諸佛不名為真供如來坐道場所得微妙法若人能修學是真供養佛又十住婆沙論云佛告阿難天雨香華不名供養恭敬如來若比丘比丘尼優婆塞優婆夷一心不放逸親近修集聖法是名真供養佛又寶雲經云不以財施供養於佛何以故如來法身不待財施唯以法施供養於佛為具佛道以法供養為最第一又善恭敬經云佛言若有比丘雖復有夏不能間解如是法句彼亦應當從他依止所以者何自尚不解況欲與他作依止師假令耆舊百夏比丘而不能解沙門祕密之事不解法律等亦應説依止若有比丘從他受法於彼師邊應起尊貴敬重之心欲受法時當在師前不得輕笑不得露齒不得交足不得視足不得動足不得踔腳師不發問不得輒言凡有所使勿得違命勿視師面離師三肘令坐即坐勿得違教於彼師所應起慈心若有所疑先應咨白若見師許然後請決當知一日三時應參進止若三時間不參進止是師應當如法治之若參師不見應持土塊或木或草以為記驗若當見師在房室內是時學者應起至心繞房三匝向師頂禮爾乃方還若不見師衆務皆止不得為也除大小便又復弟子於其師所不得麁言師所呵責不應反報師坐臥床應先敷拭令無塵污蟲蟻之屬若師坐臥乃至師起應修誦業時彼學者至日東方便到師所善知時已數往師邊咨問所須我作何事又復弟子在於師前不得涕唾若行寺內恭敬師故勿以袈裟覆於肩膊不得籠頭天時若熱日別三時以扇扇師三度授水授令洗浴又復三時應獻冷飲師所營事應盡身力而營助之佛告阿難若將來世有諸比丘或於師所不起恭敬説於師僧長短之者彼人則非是須陀洹亦非凡夫彼愚癡人應如是治師實有過尚不得説況當無也若有比丘於其師邊不恭敬者我説別有一小地獄名為椎撲當墮是中墮彼處已一身四頭身體俱然狀如火聚出大猛焰熾然不息然已復然於彼獄處復有諸蟲名曰鉤嘴彼諸毒蟲常噉舌根時彼癡人從彼捨身生畜生中皆由往昔罵辱於師舌根過故恆食屎尿捨彼身已雖生人間常生邊地具足惡法雖得人身皮不似人不能具足人之形色常被輕賤誹謗陵辱離佛世尊恆無智慧從彼死已還墮地獄更得無量無邊苦患之法謗法緣第八惟念末世法逐人訛道俗相濫傳謬背真混雜同行不修內典專事俗書縱有抄寫心不至殷既不護淨又多舛錯共同止宿或處在門簷風雨蟲齧都無驚懼致使經無靈驗之功誦無救苦之益實由造作不殷亦由我人逾慢也故敬福經云善男子經生之法不得顛倒乙字重點五百世中墮迷惑道中不聞正法又大集經云若有衆生於過去世作諸惡業或毀於法或謗聖人於説法者為作障礙或抄寫經法洗脫文字或損壞他法或暗藏他經由此業緣今得盲報又大般若經第四百四十卷云佛言諸善男子善女人等書寫般若波羅蜜多甚深經時嚬𭈁欠呿無端戲笑互相輕凌身心躁擾文句倒錯迷惑義理不得滋味橫事歘起書寫不終當知是為菩薩魔事又大乘蓮華藏經云受佛禁戒不護將來各言我是於大乘法亦如冥夜各自説言我得佛法受鐵鏘地獄苦事難述從地獄出瘖啞聾盲不見正法又阿難請戒律論云僧尼白衣等因讀經律論等行語手執翻卷者依忉利天歲數犯重突吉羅傍報二億歲墮麞鹿中恆被摺脊苦痛難忍無記戲言捉經律論亦招前報或安經像房堂簷前者依忉利天歲數八百歲犯重突吉羅罪傍報二億歲墮豬狗中生若得人身一億歲恆常作客拪屑不得自在又大品經云是人毀呰三世諸佛一切智起破法業因緣集故無量百千萬億歲墮大地獄中是破法人輩從一大地獄至一大地獄若火劫起時至他方大地獄中生在彼間從一大地獄至一大地獄彼間若火劫起時復至他方大地獄中生在彼間從一大地獄至一大地獄如是遍十方獄彼間若火劫起故從彼死已破法業因緣未盡故還來是間大地獄中生在此間亦從一大地獄至一大地獄受無量苦此間火劫起故復至十方他國土生畜生中受破法罪業苦如地獄中説重罪轉薄或得人身生盲人家生旃陀羅家生除廁擔死人種種下賤家生若無眼若一眼若瞎眼無舌無耳無手所生之處無佛無法無佛弟子處生何以故種破法業積集厚故又涅槃經云若有不信是經典者現世當為無量病苦之所惱害多為衆生所見罵辱命終之後人所輕賤顏貌醜陋資生艱難常不供足雖復少得麁澀弊惡常處貧窮下賤誹謗正法邪見之家若臨終時或值荒亂刀兵競起帝王暴虐怨家讎郤之所侵逼雖有善友而不遭遇資生所須求不能得雖少得利常為飢渴唯為凡下之所顧識國王大臣悉不齒録設復聞其有所宣説正使是理終不信受如是之人如折翼鳥不能飛行是人亦爾於未來世不能得至人天善處若復有人能信如是大乘經典本所受形雖復麁陋以經功德即便端正威顏色力日更增多常為人天之所樂見恭敬愛戀情無捨離國王大臣及家親屬聞其所説悉皆敬信若我聲聞弟子之中欲行第一希有事者當為世間廣宣如是大乘經典善男子譬如霧露勢雖欲住不過日出日既出已消滅無餘善男子是諸衆生所有惡業亦復如是住世勢力不過得見大涅槃日是日既出悉能除滅一切惡業又法華經云若佛在世若滅度後其有誹謗如斯經典見有讀誦書持經者輕賤憎嫉而懷結恨此人罪報汝今復聽其人命終入阿鼻獄具足一劫劫盡更生如是展轉至無數劫從地獄出當墮畜生於無數劫如恆河沙生輒聾啞諸根不具告舍利弗謗斯經者若説其罪窮劫不盡頌曰朝聞誠有悅夕死固無憂空見尋青簡詎是滌玄流灑血良難訪焚軀豈易求浮涼泛層液飛景燭重幽群鴻啓將慶一鳥革前修始怡披寶篋終然亂法舟八藏微難識三祇未可休自非懲心垢何得會真如敬僧篇第三此有三緣述意緣順益緣違損緣述意緣第一夫論僧寶者謂禁戒守真威儀出俗圖方外以發心棄世間而立法官榮無以動其意親屬莫能纍其想弘道以報四恩育德以資三有高越人天重逾金玉稱為僧也是知僧寶利益不可稱紀故經曰縱有持戒破戒若長若幼皆須深敬不得輕慢若違斯旨交獲重罪如釋迦佛等是真佛寶金口所説理行教果是真法寶得果沙門是真僧寶致令一瞻一禮萬纍氷消一讚一稱千災霧卷自惟薄福不逢正化賴蒙遺迹幸承餘蔭金檀銅素漆紵丹青圖像聖容名為佛寶紙絹竹帛書寫玄言名為法寶剃髮染衣執持應器名為僧寶此之三種體相雖假用表真容敬之永絶長流蔑之常招苦報如木非親母禮則響逸千齡凡非聖僧敬則光逾萬代是知斯風已扇遐邇共遵冥資含識神功岡測儻有所虧獲罪彌大既許出家理宜革俗且如禮云介者不拜為失豈同去俗之人身被忍鎧屈節白衣理所不可三寶既同義須齊敬不可偏遵佛法頓棄僧尼故法不自弘弘之在人人能弘道故須齊敬也順益緣第二如梵網經云出家人法不合禮拜國王父母六親亦不敬事鬼神又涅槃經云出家人不禮敬在家人又四分律云佛令諸比丘長幼相次禮拜不應禮拜一切白衣又佛本行經云輸頭檀王與諸眷屬百官次第禮佛已佛言王今可禮優波離比丘等諸比丘王聞佛教即從座起頂禮五百比丘新出家者次第而禮又薩遮尼乾經云若謗聲聞辟支佛法及大乘法毀呰留難者犯根本罪今僧依大小乘經不拜君親是本佛教今乃令禮交違佛教使拜跪俗人即不信佛語故犯根本罪又順正理論云諸天神衆不敢希求受五戒者禮如國君主亦不求比丘禮拜以懼損功德及壽命故又涅槃經云佛告迦葉若有建立護持正法如是之人應從啓請當捨身命而供養之如我於是大乘經説有知法者若老若少故應供養恭敬禮拜猶如事火婆羅門等有知法者若老若少故應供養恭敬禮拜亦如諸天奉事帝釋迦葉白佛言若有長宿護持禁戒從年少邊咨受未聞云何是人當禮敬不若當禮敬是則不名為持戒也若是年少護持禁戒從諸宿舊破戒人邊咨受未聞復應禮不若出家人從在家人咨受未聞復當禮不然出家人不應禮敬在家人也然佛法中年少幼小應當恭敬耆舊長宿以是長宿先受具戒成就威儀是故應當供養恭敬又中阿含經云云何知人勝如謂比丘知有二種人有信有不信若信者勝不信者為不如也謂信人復有二種有數往見比丘有不數往見比丘若數往見比丘者勝不數往見比丘者為不如也謂數往見比丘人復有二種有禮敬比丘有不禮敬比丘若禮敬比丘者勝不禮敬比丘者為不如也謂禮敬比丘人復有二種有問經有不問經若問經者勝不問經者為不如也又舊雜譬喻經云昔有國王出遊每見沙門輒下車禮道人言大王止不得下車王言我上不下所以言上不下者今我為道人作禮壽終已後當生天上是故言上不下也又善見律云輸頭檀那王禮佛已白佛言我今三度禮如來足一佛初生時阿夷相曰若在家者應作轉輪聖王若出家學道必得成佛是時地為震動我見神力即為作禮第二我出遊戲有耕田人菩薩在閻浮樹下日時已晡樹影停住不移覆菩薩身我見神力即為作禮第三今迎佛至國佛升虛空作十八變如伏外道神力無畏即為作禮又中阿含經云爾時世尊告諸比丘過去世時釋提桓因每入園觀時敕御者令嚴駕千馬之車嚴駕已竟唯王知時時天帝釋即下常勝殿東向合掌禮佛爾時御者見則心驚毛竪馬鞭落地帝釋見已即説偈言鬼汝何憂怖馬鞭落於地御者説偈白帝釋言見王天帝釋為舍脂之夫所以生恐怖馬鞭落地者常見天帝釋一切諸大地人天大小王及四護世主三十三天衆悉皆恭敬禮何處更有尊尊於帝釋者而今正東向合掌修敬禮爾時帝釋説偈答言我實於一切世間大小王及四護世主三十三天衆最為其尊主故悉來恭敬而復有世間隨順等正覺名號滿大師故我稽首禮御者復白言是必世間勝故使天王釋恭敬而合掌東向稽首禮我今亦當禮天王所禮者佛告諸比丘彼天帝釋為自在王尚恭敬佛汝等比丘出家學道亦應如是恭敬於佛彼天帝釋舍脂之夫敬禮法僧亦復讚歎禮法僧者汝等已能正信出家學道亦當如是敬禮法僧當復讚歎禮法僧者爾時帝釋從常勝殿來下周向諸方合掌恭敬時御者見天帝釋從殿來下住於中庭周向諸方合掌恭敬見已驚怖馬鞭復落地而説偈言何故憍尸迦故重於非家為我説其義飢渴願欲聞時天帝釋説偈答言我正恭敬彼能出非家者自在遊諸方不計其行止城邑國土色不能纍其心不畜資生具一往無欲定往則無所求唯無為為樂言則定善言不言則寂定諸天阿修羅各各共相違人間自共諍相違亦如是唯有出家者於諸諍無諍於一切衆生放捨於刀杖於財離財色不醉亦不荒遠離一切惡是故敬禮彼是時御者復説偈言天王之所敬是必世間勝故我從今日當禮出家人又阿育王經云昔阿恕伽王見一七歲沙彌將至屏處而為作禮語沙彌言莫向人道我禮汝時沙彌前有一澡瓶沙彌即入其中從澡瓶中復還來出而語言王慎莫向人道沙彌入澡瓶中復還來出王即語沙彌言我當現向人説不復得隱是以諸經皆云沙彌雖小亦不可輕王子雖小亦不可輕龍子雖小亦不可輕沙彌雖小能度人王子雖小能殺人龍子雖小能興雲由興雲故致雨雷電礔礰感其所小而不可輕也又付法藏經云昔佛涅槃一百年後有阿育王信敬三寶常作般遮于瑟大會王至會日香湯洗浴著新淨衣上高樓上四方頂禮遙請衆僧聖衆飛來凡二十萬王之信心深遠難量見諸沙門若長若幼若凡若聖皆迎問訊恭敬禮拜時有一臣名曰夜奢邪見熾盛無信敬心見王禮拜而作是言王甚無智自屈貴德禮拜童幼王聞是已便敕諸臣各遣推覓自死百獸人仰一頭唯使夜奢獨求人首得已各敕詣市賣之餘頭悉售夜奢人頭見者惡賤都無買者數日欲臭衆人見已咸共罵辱而語之言汝今非是旃陀羅人夜叉羅剎云何乃捉死人頭賣夜奢爾時被罵辱已來詣王所白王言臣賣人頭反被罵辱尚無欲見況有買者王復語言若無買者但當虛與夜奢受教重齎入市唱告衆人無錢買者今當虛與市人聞已重加罵辱無肯取者夜奢慚愧還至王所合掌白王此頭難售虛與不取反被罵辱況有買者王問夜奢何物最貴夜奢答王人最為貴王言若貴何故不售夜奢答王人生雖貴死則卑賤王問夜奢吾頭若死同此賤不夜奢惶懼怖不敢對王即語言施汝無畏汝當實答夜奢惶怖俯仰答王王頭若死亦同此賤王語夜奢吾頭若死同此賤者汝何怪我禮敬衆僧卿若是吾真善知識宜應勸我以危脆頭易堅固頭如何今日止吾禮拜夜奢爾時聞王此語方自悔責改邪從正歸敬三寶以是因緣衆生聞者若見三寶應當至心恭敬禮拜違損緣第三如像法決疑經云乃至一切俗人不問貴賤不得撾打三寶奴婢畜生及受三寶奴婢禮拜皆得殃咎故薩遮尼揵經云若破塔寺或取佛物若教作助喜若有沙門身著染衣或有持戒破戒若繫閉打縛或令還俗或斷其命若犯如是根本重罪決墮地獄受無間苦以王國內行此不善諸仙聖人出國而去大力諸神不護其國大臣諍競四方咸起水旱不調風雨失時人民飢餓劫賊縱橫疫癘疾病死亡無數不知自作而怨諸天又仁王經云國王大臣自恃高貴滅破吾法以作制法制我弟子不聽出家不聽造作佛像立統官制等案籍記録僧比丘地立白衣高坐又國王太子橫作法制不依佛教因緣破僧因緣統官攝僧典主僧籍苦相攝持佛法不久又大集經云佛言所有衆生於現在世及未來世應當深信佛法衆僧彼諸衆生於人天中常得受於勝妙果報不久當得入無畏城如是乃至供養一人為我出家及有依我剃除鬚髮著袈裟片不受戒者供養是人亦得功德乃至入無畏城以是緣故我如是説若復有人為我出家不持禁戒剃除鬚髮著袈裟片有非法惱害此者乃至破壞三世諸佛法身報身乃至盈滿三惡道故佛言若有衆生為我出家剃除鬚髮被服袈裟設不持戒彼等悉已為涅槃印之所印也若復出家不持戒者有以非法而作惱亂罵辱毀呰以手刀杖打縛斫截若奪衣鉢及奪種種資生具者是人則壞三世諸佛真實報身則挑一切天人眼目是人為欲隱沒諸佛所有正法三寶種故令諸天人不得利益墮地獄故為三惡道增長盈滿故爾時娑婆世界主大梵天王而白佛言若有為佛剃除鬚髮被服袈裟不受禁戒受已毀犯其剎利王與作惱亂罵辱打縛者得幾許罪佛言大梵我今為汝且略説之若有人於萬億佛所出其身血於意云何是人得罪寧為多不大梵王言若人但出一佛身血得無間罪尚多無量不可算數墮於阿鼻大地獄中何況具出萬億諸佛身血也終無有能廣説彼人罪業果報唯除如來佛言大梵若有惱亂罵辱打縛為我剃髮著袈裟片不受禁戒受而犯者得罪多彼何以故是人猶能為諸天人示涅槃道是人便已於三寶中心得敬信勝於一切九十五道其人必速能入涅槃勝於一切在家俗人唯除在家得忍辱者是故天人應當供養何況具能受持禁戒三業相應其有一切國王及以群臣諸斷事者如其見有於我法中而出家者作大罪業大殺生大偷盜大污梵行大妄語及餘不善但擯出國不聽在寺同僧事業亦不得鞭打亦不應口業罵辱加其身罪若故違法而謫罰者是人便於解脫退落受於下類遠離一切人天善道必定歸趣阿鼻地獄何況鞭打為佛出家具持戒者又十輪經云佛言族姓子有四種僧何等為四一第一義僧二清淨僧三啞羊僧四無慚愧僧云何名第一義僧諸佛菩薩辟支及四沙門果是七種人名為第一義僧在家得聖果者亦名第一義僧云何名為清淨僧諸有持具足戒者是名清淨僧云何名為啞羊僧不知犯不犯輕重微細罪可懺悔愚癡無智不近善知識不能咨問深義是善非善如是等相名為啞羊僧云何名無慚愧僧若有為自活命來入佛法悉皆毀犯破和合僧不畏後世放縱六情貪著五欲如是人等名為無慚愧僧如是四僧並須恭敬又大悲經云佛告阿難於我法中但使性是沙門污沙門行自稱沙門形似沙門當有被著袈裟衣者於此賢劫彌勒為首乃至最後盧遮如來彼諸沙門如是千佛於無餘涅槃界次第當得入般涅槃無有遺餘何以故如是一切諸沙門中乃至一稱佛名一生信者所作功德終不虛設阿難我以佛智測知法界非不測知阿難所有白業得白報黑業得黑報若有淨心諸衆生等作是稱言南無佛者彼人以是善根必定得近涅槃何況值佛親承供養又十輪經云佛言若諸比丘依佛法出家一切天人阿修羅皆應供養若護持戒不應謫罰閉繫兀其手足乃至奪命悉無是法若有破戒比丘如敗膿壞非梵行而言梵行退失墮落聖道果證為諸煩惱結使所壞猶能開示一切天龍人非人等無量功德珍寶伏藏是以依我出家若持戒若破戒我悉不聽輪王大臣宰相不得謫罰繫閉加諸鞭杖截其手足乃至斷命況復餘輕犯小威儀破戒比丘雖是死人是戒餘力猶如牛黃是牛雖死人故取之亦如麝香死後有用能大利益一切衆生惡行比丘雖犯禁戒其戒勢力猶能利益無量天人譬如燒香香體雖壞熏他令香破戒比丘亦復如是自墮惡道能令衆生增長善根以是因緣一切白衣不應侵毀輕蔑破戒比丘皆當守護尊重供養不聽謫罰繫閉其身乃至奪命爾時世尊而説偈言瞻蔔華雖萎勝於諸餘華破戒諸比丘猶勝諸外道又大集經世尊説偈云剃頭著袈裟持戒及毀戒天人可供養常令無有乏如是供養彼則為供養我若能為敬法歸依而剃頭身著袈裟服説彼是我子假使毀禁戒猶住不退地若有撾打彼則為打我身若有罵辱彼則為罵辱我是人心欲滅正法大明燈為財共鬪諍剎利同生瞋又十輪經云譬如過去有王名曰福德若人有犯罪過乃至繫縛王不欲奪命將付狂象爾時狂象捉其二足欲撲其地而見此人著染色衣故狂象即便安徐置地不敢損傷共對蹲坐以鼻舐足而生慈心族姓子象是畜生見染衣人尚不加惡生於害心乃至未來世有旃陀羅王見我法中有人出家堪任法器及不成法器故作逼惱或奪其命命終之後必墮阿鼻地獄頌曰騄驥資鞭策蘭蕙佇熏風至理信難見非人孰可通輸心仰圓極瑩曬入玄中總轡超三有摶飛上四空簪纓猶忽夢財利若塵蒙高揖謝時俗蕭灑出煩籠
